services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: showtrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-showtrack}
      POSTGRES_DB: showtrack
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U showtrack"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 320M

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://showtrack:${POSTGRES_PASSWORD:-showtrack}@postgres:5432/showtrack?sslmode=disable
      REDIS_URL: redis://redis:6379
      TMDB_API_KEY: ${TMDB_API_KEY}
      MEDIA_URL: ${MEDIA_URL:-http://media:80}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 256M

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
        NEXT_PUBLIC_FIREBASE_VAPID_KEY: ${NEXT_PUBLIC_FIREBASE_VAPID_KEY:-}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    depends_on:
      - api
    expose:
      - "3000"
    deploy:
      resources:
        limits:
          memory: 512M

  media:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - poster_data:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    expose:
      - "80"
    deploy:
      resources:
        limits:
          memory: 128M

  sync:
    build:
      context: ../services/sync
      dockerfile: Dockerfile
    restart: "no"
    profiles: ["tools"]
    environment:
      DATABASE_URL: postgres://showtrack:${POSTGRES_PASSWORD:-showtrack}@postgres:5432/showtrack?sslmode=disable
      TMDB_API_KEY: ${TMDB_API_KEY}
      MEDIA_DIR: /data
    volumes:
      - poster_data:/data
    depends_on:
      postgres:
        condition: service_healthy

  push:
    build:
      context: ../services/push
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://showtrack:${POSTGRES_PASSWORD:-showtrack}@postgres:5432/showtrack?sslmode=disable
      REDIS_URL: redis://redis:6379
      FCM_SERVICE_ACCOUNT: /secrets/fcm.json
      APNS_KEY_PATH: /secrets/apns.p8
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-}
      APNS_PRODUCTION: ${APNS_PRODUCTION:-true}
      EPISODE_CHECK_INTERVAL: ${EPISODE_CHECK_INTERVAL:-1h}
    volumes:
      - ./secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
  redisdata:
  poster_data:
