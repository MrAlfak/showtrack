services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: showtrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-showtrack}
      POSTGRES_DB: showtrack
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U showtrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://showtrack:${POSTGRES_PASSWORD:-showtrack}@postgres:5432/showtrack?sslmode=disable
      REDIS_URL: redis://redis:6379
      TMDB_API_KEY: ${TMDB_API_KEY}
      MEDIA_URL: ${MEDIA_URL:-http://media:80}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID:-}
      TRAKT_CLIENT_SECRET: ${TRAKT_CLIENT_SECRET:-}
      TRAKT_REDIRECT_URI: ${TRAKT_REDIRECT_URI:-}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.showtrack-api.rule=Host(`${API_DOMAIN:-api.localhost}`)"
      - "traefik.http.services.showtrack-api.loadbalancer.server.port=8080"

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.showtrack-web.rule=Host(`${WEB_DOMAIN:-app.localhost}`)"
      - "traefik.http.services.showtrack-web.loadbalancer.server.port=3000"

  media:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - poster_data:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.showtrack-media.rule=Host(`${MEDIA_DOMAIN:-media.localhost}`)"
      - "traefik.http.services.showtrack-media.loadbalancer.server.port=80"

  sync:
    build:
      context: ../services/sync
      dockerfile: Dockerfile
    restart: "no"
    environment:
      DATABASE_URL: postgres://showtrack:${POSTGRES_PASSWORD:-showtrack}@postgres:5432/showtrack?sslmode=disable
      TMDB_API_KEY: ${TMDB_API_KEY}
      MEDIA_DIR: /data
    volumes:
      - poster_data:/data
    depends_on:
      postgres:
        condition: service_healthy

  push:
    build:
      context: ../services/push
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://showtrack:${POSTGRES_PASSWORD:-showtrack}@postgres:5432/showtrack?sslmode=disable
      REDIS_URL: redis://redis:6379
      FCM_SERVICE_ACCOUNT: /secrets/fcm.json
      APNS_KEY_PATH: /secrets/apns.p8
      APNS_KEY_ID: ${APNS_KEY_ID}
      APNS_TEAM_ID: ${APNS_TEAM_ID}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID}
      EPISODE_CHECK_INTERVAL: ${EPISODE_CHECK_INTERVAL:-1h}
    volumes:
      - ./secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  poster_data:
